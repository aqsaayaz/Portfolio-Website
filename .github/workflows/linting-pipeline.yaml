name: Linting Check

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install htmlhint stylelint stylelint-config-standard --save-dev

      - name: Lint HTML
        run: npx htmlhint "src/**/*.html"

      - name: Lint CSS
        run: npx stylelint "styles/**/*.css"
